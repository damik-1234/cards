<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Parcel Delivery Simulator 3D</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:15px;
    border-radius:10px;
    width:260px;
}
#missionBox {
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    color:white;
    padding:15px;
    border-radius:10px;
    width:500px;
    text-align:center;
}
button {
    padding:5px 10px;
    margin-top:5px;
}
</style>
</head>
<body>

<div id="ui">
    <h3>🚚 Parcel Delivery Simulator</h3>
    <div>Penize: <span id="money">0</span> Kč</div>
    <div>Palivo: <span id="fuel">100</span>%</div>
    <div>Stav auta: <span id="health">100</span>%</div>
    <div>Baliky: <span id="packages">0</span></div>
    <hr>
    <button onclick="refuel()">Natankovat (200 Kč)</button><br>
    <button onclick="repair()">Opravit (300 Kč)</button>
</div>

<div id="missionBox">
    <div id="missionText">Vydej se do skladu pro balík.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
/* ============================================================
   PARCEL DELIVERY SIMULATOR 3D
   Kompletní 3D hra v jednom souboru
   ============================================================ */

// ZÁKLADNÍ SCÉNA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// SVĚTLO
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.4));

// ZEM
const groundGeo = new THREE.PlaneGeometry(2000,2000);
const groundMat = new THREE.MeshLambertMaterial({color:0x228B22});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// MĚSTO
const buildings = [];
function createBuilding(x,z) {
    const geo = new THREE.BoxGeometry(20, Math.random()*60+20, 20);
    const mat = new THREE.MeshLambertMaterial({color:0x888888});
    const b = new THREE.Mesh(geo,mat);
    b.position.set(x, geo.parameters.height/2, z);
    scene.add(b);
    buildings.push(b);
}

for(let i=-400;i<=400;i+=80){
    for(let j=-400;j<=400;j+=80){
        if(Math.random()>0.3)
            createBuilding(i,j);
    }
}

// AUTO HRÁČE
const car = new THREE.Group();
scene.add(car);

const bodyGeo = new THREE.BoxGeometry(8,3,14);
const bodyMat = new THREE.MeshLambertMaterial({color:0xff0000});
const body = new THREE.Mesh(bodyGeo,bodyMat);
body.position.y = 3;
car.add(body);

car.position.set(0,0,0);

camera.position.set(0,15,-25);
camera.lookAt(car.position);

// HRÁČ DATA
let speed=0;
let maxSpeed=2;
let fuel=100;
let health=100;
let money=1000;
let packageCount=0;

document.getElementById("money").innerText = money;

// BALÍKY
const packages = [];
function spawnPackage(){
    const geo = new THREE.BoxGeometry(3,3,3);
    const mat = new THREE.MeshLambertMaterial({color:0xffff00});
    const box = new THREE.Mesh(geo,mat);
    box.position.set(Math.random()*600-300,1.5,Math.random()*600-300);
    scene.add(box);
    packages.push(box);
}
for(let i=0;i<10;i++) spawnPackage();

// DORUČOVACÍ BODY
const deliveryPoints=[];
function spawnDelivery(){
    const geo = new THREE.CylinderGeometry(5,5,1,32);
    const mat = new THREE.MeshLambertMaterial({color:0x0000ff});
    const c = new THREE.Mesh(geo,mat);
    c.position.set(Math.random()*600-300,0.5,Math.random()*600-300);
    scene.add(c);
    deliveryPoints.push(c);
}
for(let i=0;i<5;i++) spawnDelivery();

// OVLÁDÁNÍ
const keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// FUNKCE PALIVO
function refuel(){
    if(money>=200){
        money-=200;
        fuel=100;
    }
}

function repair(){
    if(money>=300){
        money-=300;
        health=100;
    }
}

// KOLIZE
function checkCollisions(){
    buildings.forEach(b=>{
        if(car.position.distanceTo(b.position)<15){
            health-=0.5;
        }
    });
}

// SBĚR BALÍKU
function checkPickup(){
    packages.forEach((p,index)=>{
        if(car.position.distanceTo(p.position)<10){
            scene.remove(p);
            packages.splice(index,1);
            packageCount++;
        }
    });
}

// DORUČENÍ
function checkDelivery(){
    deliveryPoints.forEach(d=>{
        if(car.position.distanceTo(d.position)<10 && packageCount>0){
            packageCount--;
            money+=500;
        }
    });
}

// DEN/NOC CYKLUS
let time=0;

// HLAVNÍ SMYČKA
function animate(){
    requestAnimationFrame(animate);

    time+=0.001;
    light.intensity = Math.sin(time)+1.2;

    if(keys["w"] && fuel>0){
        speed = Math.min(speed+0.05,maxSpeed);
        fuel-=0.02;
    }
    if(keys["s"]){
        speed = Math.max(speed-0.05,-1);
    }
    if(keys["a"]) car.rotation.y += 0.03;
    if(keys["d"]) car.rotation.y -= 0.03;

    speed*=0.98;

    car.position.x -= Math.sin(car.rotation.y)*speed;
    car.position.z -= Math.cos(car.rotation.y)*speed;

    camera.position.x = car.position.x + Math.sin(car.rotation.y)*20;
    camera.position.z = car.position.z + Math.cos(car.rotation.y)*20;
    camera.lookAt(car.position);

    checkCollisions();
    checkPickup();
    checkDelivery();

    document.getElementById("fuel").innerText=Math.floor(fuel);
    document.getElementById("health").innerText=Math.floor(health);
    document.getElementById("money").innerText=money;
    document.getElementById("packages").innerText=packageCount;

    if(health<=0){
        alert("Auto je zničeno!");
        location.reload();
    }

    renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
